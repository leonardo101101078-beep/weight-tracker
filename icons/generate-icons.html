<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<a id="dl192" download="icon-192.png">下載 192px</a><br>
<a id="dl512" download="icon-512.png">下載 512px</a>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // 背景
  ctx.fillStyle = '#4A90E2';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  // 體重計圖形
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${s * 0.42}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚖', s / 2, s / 2);
}
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  drawIcon(c);
  const dl = document.getElementById('dl' + id.replace('c',''));
  dl.href = c.toDataURL('image/png');
});
</script>
</body>
</html>
