<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2D6A4F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="體重紀錄" />
  <title>體重紀錄小幫手</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <!-- ── 標頭 Hero ─────────────────────────────── -->
  <header class="date-header">
    <!-- 葉片裝飾 SVG -->
    <svg class="leaf-deco leaf-1" viewBox="0 0 160 280" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M80 8 C115 40 145 110 130 185 C115 255 45 275 25 235 C5 195 18 110 48 62 C65 30 80 8 80 8Z" fill="white"/>
      <line x1="80" y1="8" x2="80" y2="240" stroke="white" stroke-width="1.2"/>
      <line x1="80" y1="70"  x2="50" y2="95"  stroke="white" stroke-width="0.7"/>
      <line x1="80" y1="105" x2="45" y2="135" stroke="white" stroke-width="0.7"/>
      <line x1="80" y1="140" x2="40" y2="170" stroke="white" stroke-width="0.7"/>
      <line x1="80" y1="70"  x2="112" y2="95"  stroke="white" stroke-width="0.7"/>
      <line x1="80" y1="105" x2="116" y2="135" stroke="white" stroke-width="0.7"/>
      <line x1="80" y1="140" x2="118" y2="170" stroke="white" stroke-width="0.7"/>
    </svg>
    <svg class="leaf-deco leaf-2" viewBox="0 0 120 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M60 5 C90 30 108 85 95 145 C82 198 22 210 8 175 C-5 140 10 78 36 42 C50 20 60 5 60 5Z" fill="white"/>
      <line x1="60" y1="5" x2="60" y2="180" stroke="white" stroke-width="1"/>
      <line x1="60" y1="55"  x2="36" y2="76"  stroke="white" stroke-width="0.6"/>
      <line x1="60" y1="90"  x2="32" y2="114" stroke="white" stroke-width="0.6"/>
      <line x1="60" y1="55"  x2="84" y2="76"  stroke="white" stroke-width="0.6"/>
      <line x1="60" y1="90"  x2="87" y2="114" stroke="white" stroke-width="0.6"/>
    </svg>
    <svg class="leaf-deco leaf-3" viewBox="0 0 140 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M70 6 C102 35 125 96 112 164 C99 225 35 242 18 205 C1 168 15 96 42 54 C57 26 70 6 70 6Z" fill="white"/>
      <line x1="70" y1="6" x2="70" y2="210" stroke="white" stroke-width="1"/>
    </svg>

    <div id="today-date" class="date-text">
      <span class="date-day" id="date-day"></span>
      <div class="date-mid-row">
        <span class="date-month" id="date-month"></span>
        <span class="date-sep">/</span>
        <span class="date-year" id="date-year"></span>
      </div>
      <div class="date-weekday" id="date-weekday"></div>
    </div>
    <div class="date-sub">體重紀錄小幫手</div>
  </header>

  <!-- ── 主內容 ────────────────────────────────── -->
  <div class="main-content">

    <!-- 今日體重 -->
    <section class="card" id="weight-section">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2 L18 2 L20 7 L4 7 Z"/>
            <rect x="3" y="7" width="18" height="14" rx="2"/>
            <path d="M12 11 L12 15 M10 13 L14 13"/>
          </svg>
        </div>
        <h2 class="section-title">今日體重</h2>
      </div>
      <div class="weight-input-row">
        <input type="number" id="weight-input" placeholder="0.0" step="0.1" min="20" max="300" />
        <span class="unit">kg</span>
        <button id="save-weight-btn" class="btn-primary">儲存</button>
      </div>
      <div id="weight-feedback" class="feedback"></div>
    </section>

    <!-- 七日體重趨勢 -->
    <section class="card" id="chart-section">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 17 8 12 13 15 19 7"/>
            <line x1="3" y1="21" x2="21" y2="21"/>
            <line x1="3" y1="3"  x2="3"  y2="21"/>
          </svg>
        </div>
        <h2 class="section-title">七日體重趨勢</h2>
      </div>
      <div class="chart-wrapper">
        <canvas id="weight-chart"></canvas>
      </div>
    </section>

    <!-- 飲食紀錄 -->
    <section class="card" id="notes-section">
      <div class="section-header">
        <div class="section-icon brown-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 C7 2 3 7 3 13 C3 18 7 22 12 22 C17 22 21 18 21 13 C21 7 17 2 12 2Z"/>
            <path d="M12 6 L12 13 L16 11"/>
          </svg>
        </div>
        <h2 class="section-title">飲食紀錄</h2>
      </div>
      <textarea id="notes-input" placeholder="記錄今日飲食內容…" rows="4"></textarea>
      <button id="save-notes-btn" class="btn-secondary">儲存筆記</button>
      <div id="notes-feedback" class="feedback"></div>
    </section>

    <!-- 運動 -->
    <section class="card" id="exercise-section">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="13" cy="4" r="1.5"/>
            <path d="M7 22 L9.5 14 L12 17 L15 11 L17 14"/>
            <path d="M5 11 L9 9 L12 12 L15 9"/>
          </svg>
        </div>
        <h2 class="section-title">運動</h2>
      </div>
      <div class="exercise-chips">
        <label class="chip"><input type="checkbox" value="跑步" /><span>🏃 跑步</span></label>
        <label class="chip"><input type="checkbox" value="健走" /><span>🚶 健走</span></label>
        <label class="chip"><input type="checkbox" value="重訓" /><span>💪 重訓</span></label>
        <label class="chip"><input type="checkbox" value="游泳" /><span>🏊 游泳</span></label>
        <label class="chip"><input type="checkbox" value="瑜伽" /><span>🧘 瑜伽</span></label>
        <label class="chip"><input type="checkbox" value="騎車" /><span>🚴 騎車</span></label>
        <label class="chip"><input type="checkbox" value="爬樓機" /><span>🏢 爬樓機</span></label>
        <label class="chip"><input type="checkbox" value="其他" /><span>✨ 其他</span></label>
      </div>
      <textarea id="exercise-notes" placeholder="運動筆記（時間、組數、距離…）" rows="3"></textarea>
      <button id="save-exercise-btn" class="btn-secondary">儲存運動</button>
      <div id="exercise-feedback" class="feedback"></div>
    </section>

    <!-- 體重對比 -->
    <section class="card" id="compare-section">
      <div class="section-header">
        <div class="section-icon brown-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 6 L3 12 L8 18"/>
            <path d="M16 6 L21 12 L16 18"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
          </svg>
        </div>
        <h2 class="section-title">體重對比</h2>
      </div>
      <div class="compare-grid">
        <div class="compare-card">
          <div class="compare-label">昨日</div>
          <div id="yesterday-weight" class="compare-weight">—</div>
          <div id="yesterday-notes" class="compare-notes"></div>
          <div id="yesterday-exercise" class="compare-exercise"></div>
        </div>
        <div class="compare-card today">
          <div class="compare-label">今日</div>
          <div id="today-weight" class="compare-weight">—</div>
          <div id="today-notes" class="compare-notes"></div>
          <div id="today-exercise" class="compare-exercise"></div>
        </div>
      </div>
      <div id="weight-diff" class="weight-diff"></div>
    </section>

  </div><!-- /main-content -->

  <!-- ── 底部按鈕 ──────────────────────────────── -->
  <div class="bottom-actions">
    <button id="history-btn" class="btn-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="14" x2="8" y2="14" stroke-width="2"/>
        <line x1="12" y1="14" x2="12" y2="14" stroke-width="2"/>
        <line x1="16" y1="14" x2="16" y2="14" stroke-width="2"/>
        <line x1="8" y1="18" x2="8" y2="18" stroke-width="2"/>
        <line x1="12" y1="18" x2="12" y2="18" stroke-width="2"/>
      </svg>
      體重紀錄
    </button>
    <button id="export-btn" class="btn-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15 L21 19 A2 2 0 0 1 19 21 L5 21 A2 2 0 0 1 3 19 L3 15"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      導出記錄
    </button>
  </div>

</div><!-- /app -->

<!-- ── 體重紀錄 Modal（月曆） ──────────────────── -->
<div id="history-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>體重紀錄</h3>
      <button class="modal-close" data-modal="history-modal">✕</button>
    </div>

    <div class="cal-nav">
      <button id="cal-prev" class="cal-arrow">‹</button>
      <span id="cal-title" class="cal-title"></span>
      <button id="cal-next" class="cal-arrow">›</button>
    </div>

    <div class="cal-weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span>
      <span>四</span><span>五</span><span>六</span>
    </div>
    <div id="cal-grid" class="cal-grid"></div>

    <div id="cal-edit-panel" class="cal-edit-panel hidden">
      <div id="cal-edit-date" class="cal-edit-date"></div>
      <div class="cal-edit-row">
        <input type="number" id="cal-weight-input" placeholder="體重" step="0.1" min="20" max="300" />
        <span class="unit">kg</span>
      </div>
      <textarea id="cal-notes-input" placeholder="飲食紀錄…" rows="3"></textarea>
      <div class="cal-exercise-row">
        <div class="cal-exercise-label">運動</div>
        <div class="cal-exercise-chips" id="cal-exercise-chips">
          <label class="chip sm"><input type="checkbox" value="跑步" /><span>🏃</span></label>
          <label class="chip sm"><input type="checkbox" value="健走" /><span>🚶</span></label>
          <label class="chip sm"><input type="checkbox" value="重訓" /><span>💪</span></label>
          <label class="chip sm"><input type="checkbox" value="游泳" /><span>🏊</span></label>
          <label class="chip sm"><input type="checkbox" value="瑜伽" /><span>🧘</span></label>
          <label class="chip sm"><input type="checkbox" value="騎車" /><span>🚴</span></label>
          <label class="chip sm"><input type="checkbox" value="爬樓機" /><span>🏢</span></label>
          <label class="chip sm"><input type="checkbox" value="其他" /><span>✨</span></label>
        </div>
        <textarea id="cal-exercise-notes" placeholder="運動筆記…" rows="2"></textarea>
      </div>
      <button id="cal-save-btn" class="btn-primary full-width">儲存</button>
      <div id="cal-feedback" class="feedback"></div>
    </div>
  </div>
</div>

<!-- ── 導出記錄 Modal ────────────────────────── -->
<div id="export-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>導出記錄</h3>
      <button class="modal-close" data-modal="export-modal">✕</button>
    </div>
    <div class="export-form">
      <label>
        開始日期
        <input type="date" id="export-start" />
      </label>
      <label>
        結束日期
        <input type="date" id="export-end" />
      </label>
      <button id="download-btn" class="btn-primary full-width">下載 Excel</button>
      <div id="export-feedback" class="feedback"></div>
    </div>
  </div>
</div>

<!-- 遮罩 -->
<div id="overlay" class="overlay hidden"></div>

<!-- CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- 模組 -->
<script src="js/db.js?v=7"></script>
<script src="js/chart-render.js?v=7"></script>
<script src="js/export.js?v=7"></script>
<script src="js/app.js?v=7"></script>
</body>
</html>
